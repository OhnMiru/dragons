<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Олли — Дракон-Хранитель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a3a1a 0%, #0e2a0e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Playfair Display', Georgia, serif;
            padding: 16px;
        }

        .game-container {
            max-width: 700px;
            width: 100%;
            background: rgba(30, 25, 15, 0.6);
            border-radius: 64px 64px 48px 48px;
            backdrop-filter: blur(3px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,215,0,0.2);
            border: 1px solid rgba(255, 215, 0, 0.4);
            overflow: hidden;
        }

        .header {
            background: #2c2112;
            padding: 20px 20px 12px;
            text-align: center;
            border-bottom: 2px solid #ffd966;
        }

        .dragon-name {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffd966;
            text-shadow: 0 2px 5px #5a3e1a;
            letter-spacing: 2px;
        }

        .dragon-title {
            font-size: 0.85rem;
            color: #c9a23b;
            margin-top: 4px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            background: #1f2a0e;
            margin: 12px 20px 0;
            border-radius: 60px;
            padding: 8px 16px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.5), 0 2px 4px rgba(255,215,0,0.2);
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            color: #d4b45a;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffdf80;
        }

        .game-area {
            position: relative;
            background: #2f4425;
            background-image: radial-gradient(circle at 10% 20%, #3f6030 2%, transparent 2.5%);
            background-size: 28px 28px;
            min-height: 380px;
            height: 55vw;
            max-height: 460px;
            margin: 16px 20px 0;
            border-radius: 48px;
            overflow: hidden;
            cursor: none;
            border: 2px solid #d4af37;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4), 0 6px 12px rgba(0,0,0,0.3);
        }

        .dragon {
            position: absolute;
            width: 85px;
            height: 85px;
            background-image: url('dragon.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            z-index: 20;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            image-rendering: crisp-edges;
        }

        .coin {
            position: absolute;
            width: 32px;
            height: 32px;
            background: radial-gradient(circle at 30% 30%, #ffdf80, #d4a017);
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 5;
            transition: left 0.3s ease, top 0.3s ease;
        }

        .coin::after {
            content: "✦";
            color: #ffecb3;
            font-size: 18px;
            text-shadow: 0 0 2px gold;
        }

        .prophecy-panel {
            background: #241f14;
            margin: 20px 20px 20px;
            border-radius: 40px;
            padding: 16px 18px;
            border-top: 1px solid #f3b33d;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.6), 0 5px 12px black;
        }

        .prophecy-title {
            font-size: 1rem;
            font-weight: bold;
            color: #ffcf6e;
            letter-spacing: 2px;
            border-left: 4px solid #ffbc3c;
            padding-left: 12px;
            margin-bottom: 12px;
        }

        .prophecy-list {
            max-height: 180px;
            overflow-y: auto;
            padding-right: 6px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .prophecy-item {
            background: #362d1c;
            border-radius: 30px;
            padding: 8px 14px;
            color: #f7e5b1;
            font-size: 0.85rem;
            border-left: 4px solid #ffbc3c;
            transition: 0.1s;
            font-style: italic;
        }

        .reset-button {
            background: #46381c;
            border: none;
            color: #ffd966;
            font-size: 0.8rem;
            padding: 6px 14px;
            border-radius: 50px;
            margin-top: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.1s;
            width: fit-content;
        }

        .reset-button:active {
            background: #6b4e1c;
            transform: scale(0.97);
        }

        .warning {
            font-size: 0.65rem;
            text-align: center;
            color: #ffaa33;
            margin: 8px 20px 0;
        }

        footer {
            font-size: 0.65rem;
            text-align: center;
            color: #ad9a5a;
            padding: 12px 0 18px;
        }

        @media (max-width: 550px) {
            .dragon { width: 65px; height: 65px; }
            .coin { width: 28px; height: 28px; }
            .coin::after { font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div class="dragon-name">Олли</div>
        <div class="dragon-title">Хранитель золотых предсказаний</div>
        <div class="stats-row">
            <div class="stat">
                <div class="stat-label">✦ сегодня ✦</div>
                <div class="stat-value" id="todayCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">✦ всего ✦</div>
                <div class="stat-value" id="totalScore">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">📜 осталось</div>
                <div class="stat-value" id="leftToday">5</div>
            </div>
        </div>
    </div>

    <div class="game-area" id="gameArea">
        <div class="dragon" id="dragon"></div>
    </div>

    <div class="prophecy-panel">
        <div class="prophecy-title">📜 предсказания дракона Олли</div>
        <div class="prophecy-list" id="prophecyList">
            <div class="prophecy-item">✦ Твоя мягкая сила меняет мир вокруг ✦</div>
        </div>
        <button class="reset-button" id="resetBtn">очистить предсказания</button>
    </div>
    <div class="warning" id="warningMsg"></div>
    <footer>Олли приносит не больше 5 предсказаний в день. Возвращайся завтра!</footer>
</div>

<script>
    // ---------- БОЛЬШАЯ КОЛЛЕКЦИЯ ПРЕДСКАЗАНИЙ ----------
    const PROPHECIES = [
        "Золото не блестит ярче твоей души",
        "Сегодня зелёный дракон шепчет: верь в чудо",
        "Маленький шаг отваги приведёт к большому сокровищу",
        "Олли помнит твои добрые мысли, они питают его крылья",
        "Внутри тебя живёт пламя, которое зажжёт любую звезду",
        "Каждый лист, упавший с неба, приносит новую надежду",
        "Спокойствие — твоя магия. Сегодня она особенно сильна",
        "Золотая искра поймана — удача повернётся к тебе лицом",
        "Драконья мудрость: иногда лучшее действие — это пауза",
        "Твоя улыбка создаёт невидимое золото в воздухе",
        "Олли видит твой путь — он усыпан светлыми возможностями",
        "Собери семь искр, и загадай желание, оно услышано",
        "Бережность к себе — это драгоценный дар, не теряй его",
        "Сегодня зелёный цвет принесёт вдохновение",
        "Дракон Олли благодарит тебя за заботу о мире",
        "Творчество — это твой второй крылатый союзник",
        "Даже тень от золотой монеты приносит удачу",
        "Мудрость растёт там, где ты позволяешь себе отдыхать",
        "Олли шепчет: твоё терпение превращается в золотые нити",
        "Ночью звезды будут ярче, если вспомнишь сегодняшнюю игру",
        "Твоя доброта — магнит для малых чудес",
        "Зелёный лес внутри тебя всегда цветёт",
        "Собранная искра — знак, что день пройдёт легко",
        "Олли желает тебе творческих озарений",
        "Пусть мягкость будет твоей силой в этом сезоне",
        "Драконья защита обнимает тебя невидимым золотым кругом",
        "Сегодня слова, сказанные тобой, обретут крылья",
        "Маленькая радость спрятана в привычных вещах — отыщи её",
        "Олли копит для тебя светлые перемены",
        "Если почувствуешь усталость — вспомни, как сверкают искры",
        "Твой внутренний свет сейчас особенно мягок и ярок",
        "Даже один вдох может стать началом чего-то нового",
        "Ты не одна — зелёный дракон наблюдает с теплотой",
        "Завтрашний день получит искорку от сегодняшней игры"
    ];

    // ----- Константы -----
    const MAX_PROPHECIES_PER_DAY = 5;   // не больше 5 предсказаний в день
    const COIN_SPAWN_DELAY = 3800;      // искра каждые 3.8 секунды
    const COIN_MOVE_INTERVAL = 2800;    // каждые 2.8 секунды искры меняют позицию

    // ----- Глобальные переменные -----
    let totalScore = 0;                  // всего собрано искр за всё время
    let todayPropheciesCount = 0;        // сколько предсказаний получено сегодня
    let currentProphecies = [];           // список полученных предсказаний
    let lastDate = null;                  // дата последнего сброса
    let coins = [];
    let spawnInterval;
    let moveInterval;
    let gameArea, dragon, warningMsg;

    // Элементы DOM
    const todayCountSpan = document.getElementById('todayCount');
    const totalScoreSpan = document.getElementById('totalScore');
    const leftTodaySpan = document.getElementById('leftToday');
    const prophecyListDiv = document.getElementById('prophecyList');
    const resetBtn = document.getElementById('resetBtn');

    // ---------- Функции работы с датой и лимитами ----------
    function getTodayKey() {
        const now = new Date();
        return `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
    }

    function resetDailyIfNeeded() {
        const today = getTodayKey();
        if (lastDate !== today) {
            // Новый день — сбрасываем счётчик предсказаний
            todayPropheciesCount = 0;
            lastDate = today;
            localStorage.setItem('olli_last_date', lastDate);
            localStorage.setItem('olli_today_prophecies', todayPropheciesCount);
            updateStatsUI();
            // Показываем сообщение о новом дне
            if (warningMsg) {
                warningMsg.textContent = "✨ Новый день! Олли снова готов дарить предсказания ✨";
                setTimeout(() => { warningMsg.textContent = ""; }, 4000);
            }
        }
    }

    // Проверка, можно ли получить новое предсказание
    function canGetNewProphecy() {
        resetDailyIfNeeded();
        return todayPropheciesCount < MAX_PROPHECIES_PER_DAY;
    }

    // Добавить предсказание (только если лимит не исчерпан)
    function addProphecyIfPossible() {
        if (!canGetNewProphecy()) {
            if (warningMsg) {
                warningMsg.textContent = "Олли устал... Приходи завтра за новыми предсказаниями!";
                setTimeout(() => { if (warningMsg) warningMsg.textContent = ""; }, 3000);
            }
            return false;
        }
        
        // Выбираем предсказание, которого ещё нет в списке
        let available = PROPHECIES.filter(p => !currentProphecies.includes(p));
        if (available.length === 0) {
            // Все предсказания уже получены!
            if (warningMsg) {
                warningMsg.textContent = "Олли рассказал все свои тайны! Ты настоящий друг дракона ✨";
            }
            return false;
        }
        
        const newProph = available[Math.floor(Math.random() * available.length)];
        currentProphecies.unshift(newProph);
        if (currentProphecies.length > 18) currentProphecies.pop();
        
        todayPropheciesCount++;
        localStorage.setItem('olli_today_prophecies', todayPropheciesCount);
        localStorage.setItem('olli_prophecies', JSON.stringify(currentProphecies));
        
        renderProphecies();
        updateStatsUI();
        
        // Визуальный фидбек
        const panel = document.querySelector('.prophecy-panel');
        panel.style.transition = '0.1s';
        panel.style.backgroundColor = '#3a2e1a';
        setTimeout(() => { panel.style.backgroundColor = ''; }, 200);
        
        return true;
    }

    // Обновление статистики на экране
    function updateStatsUI() {
        todayCountSpan.textContent = todayPropheciesCount;
        totalScoreSpan.textContent = totalScore;
        const left = Math.max(0, MAX_PROPHECIES_PER_DAY - todayPropheciesCount);
        leftTodaySpan.textContent = left;
    }

    // Сохранение/загрузка всех данных
    function loadAllData() {
        // Загружаем счёт
        const savedTotal = localStorage.getItem('olli_total_score');
        if (savedTotal !== null && !isNaN(parseInt(savedTotal))) {
            totalScore = parseInt(savedTotal);
        } else {
            totalScore = 0;
        }
        
        // Загружаем предсказания
        const savedProphecies = localStorage.getItem('olli_prophecies');
        if (savedProphecies) {
            try {
                currentProphecies = JSON.parse(savedProphecies);
                renderProphecies();
            } catch(e) { initDefaultProphecy(); }
        } else {
            initDefaultProphecy();
        }
        
        // Загружаем дату и счётчик предсказаний за сегодня
        const savedDate = localStorage.getItem('olli_last_date');
        const savedToday = localStorage.getItem('olli_today_prophecies');
        const today = getTodayKey();
        
        if (savedDate === today && savedToday !== null) {
            lastDate = savedDate;
            todayPropheciesCount = parseInt(savedToday) || 0;
        } else {
            lastDate = today;
            todayPropheciesCount = 0;
            localStorage.setItem('olli_last_date', lastDate);
            localStorage.setItem('olli_today_prophecies', '0');
        }
        
        updateStatsUI();
    }

    function initDefaultProphecy() {
        currentProphecies = [ "Твоя мягкая сила меняет мир вокруг" ];
        renderProphecies();
        saveProphecies();
    }

    function saveProphecies() {
        localStorage.setItem('olli_prophecies', JSON.stringify(currentProphecies));
    }

    function renderProphecies() {
        prophecyListDiv.innerHTML = '';
        for (let p of currentProphecies) {
            const div = document.createElement('div');
            div.className = 'prophecy-item';
            div.textContent = '✦ ' + p + ' ✦';
            prophecyListDiv.appendChild(div);
        }
    }

    // Добавление очков (вызывается при сборе искры)
    function addScore(amount) {
        totalScore += amount;
        localStorage.setItem('olli_total_score', totalScore);
        totalScoreSpan.textContent = totalScore;
        
        // Каждые 3 собранные искры даём предсказание (если лимит не исчерпан)
        // Счётчик искр НЕ сбрасывается, но предсказания привязаны к икрам
        // Используем временный счётчик искр с момента последнего предсказания
        let tempCounter = parseInt(localStorage.getItem('olli_temp_counter') || '0');
        tempCounter += amount;
        if (tempCounter >= 3) {
            tempCounter = 0;
            addProphecyIfPossible();
        }
        localStorage.setItem('olli_temp_counter', tempCounter);
    }

    // ---------- Игровая механика ----------
    function createCoin() {
        if (!gameArea) return;
        const rect = gameArea.getBoundingClientRect();
        if (rect.width === 0) return;
        const coinSize = 32;
        const maxX = Math.max(40, rect.width - coinSize - 10);
        const maxY = Math.max(40, rect.height - coinSize - 10);
        const left = 10 + Math.random() * (maxX - 10);
        const top = 10 + Math.random() * (maxY - 10);
        const coinDiv = document.createElement('div');
        coinDiv.className = 'coin';
        coinDiv.style.left = left + 'px';
        coinDiv.style.top = top + 'px';
        gameArea.appendChild(coinDiv);
        coins.push({
            element: coinDiv,
            x: left,
            y: top,
            w: coinSize,
            h: coinSize,
            vx: (Math.random() - 0.5) * 25,
            vy: (Math.random() - 0.5) * 25
        });
    }

    // Перемещение всех монет
    function moveCoins() {
        if (!gameArea) return;
        const rect = gameArea.getBoundingClientRect();
        const margin = 15;
        for (let coin of coins) {
            if (!coin.element) continue;
            let newX = coin.x + coin.vx;
            let newY = coin.y + coin.vy;
            // Отскок от границ
            if (newX < margin) {
                newX = margin;
                coin.vx = Math.abs(coin.vx) * 0.9;
            }
            if (newX > rect.width - coin.w - margin) {
                newX = rect.width - coin.w - margin;
                coin.vx = -Math.abs(coin.vx) * 0.9;
            }
            if (newY < margin) {
                newY = margin;
                coin.vy = Math.abs(coin.vy) * 0.9;
            }
            if (newY > rect.height - coin.h - margin) {
                newY = rect.height - coin.h - margin;
                coin.vy = -Math.abs(coin.vy) * 0.9;
            }
            coin.x = newX;
            coin.y = newY;
            coin.element.style.left = coin.x + 'px';
            coin.element.style.top = coin.y + 'px';
        }
    }

    function removeCoin(coinObj) {
        if (coinObj.element && coinObj.element.parentNode) coinObj.element.remove();
        const idx = coins.indexOf(coinObj);
        if (idx !== -1) coins.splice(idx, 1);
    }

    function checkCollisions(dragonRect) {
        for (let i = coins.length-1; i >= 0; i--) {
            const c = coins[i];
            if (!c.element) { coins.splice(i,1); continue; }
            const coinRect = {
                left: c.x,
                top: c.y,
                right: c.x + c.w,
                bottom: c.y + c.h
            };
            if (dragonRect.right > coinRect.left && dragonRect.left < coinRect.right &&
                dragonRect.bottom > coinRect.top && dragonRect.top < coinRect.bottom) {
                removeCoin(c);
                addScore(1);
            }
        }
    }

    let dragonWidth = 85, dragonHeight = 85;

    function moveDragon(clientX, clientY) {
        const areaRect = gameArea.getBoundingClientRect();
        let relX = clientX - areaRect.left;
        let relY = clientY - areaRect.top;
        relX = Math.min(Math.max(relX, dragonWidth/2), areaRect.width - dragonWidth/2);
        relY = Math.min(Math.max(relY, dragonHeight/2), areaRect.height - dragonHeight/2);
        dragon.style.left = relX + 'px';
        dragon.style.top = relY + 'px';

        const dragonRect = {
            left: relX - dragonWidth/2,
            top: relY - dragonHeight/2,
            right: relX + dragonWidth/2,
            bottom: relY + dragonHeight/2
        };
        checkCollisions(dragonRect);
    }

    function handleStart(e) {
        e.preventDefault();
        const point = e.touches ? e.touches[0] : e;
        moveDragon(point.clientX, point.clientY);
    }
    function handleMove(e) {
        e.preventDefault();
        const point = e.touches ? e.touches[0] : e;
        moveDragon(point.clientX, point.clientY);
    }

    function bindEvents() {
        gameArea.addEventListener('mousemove', handleMove);
        gameArea.addEventListener('mousedown', handleStart);
        gameArea.addEventListener('touchstart', handleStart, {passive: false});
        gameArea.addEventListener('touchmove', handleMove, {passive: false});
    }

    function updateAreaSize() {
        if (!gameArea) return;
        const rect = gameArea.getBoundingClientRect();
        let currentLeft = parseFloat(dragon.style.left);
        let currentTop = parseFloat(dragon.style.top);
        if (isNaN(currentLeft)) { currentLeft = rect.width/2; currentTop = rect.height/2; }
        currentLeft = Math.min(Math.max(currentLeft, dragonWidth/2), rect.width - dragonWidth/2);
        currentTop = Math.min(Math.max(currentTop, dragonHeight/2), rect.height - dragonHeight/2);
        dragon.style.left = currentLeft + 'px';
        dragon.style.top = currentTop + 'px';
    }

    function startSpawning() {
        if (spawnInterval) clearInterval(spawnInterval);
        spawnInterval = setInterval(() => {
            if (coins.length < 10) {
                createCoin();
            }
        }, COIN_SPAWN_DELAY);
    }

    function startMoving() {
        if (moveInterval) clearInterval(moveInterval);
        moveInterval = setInterval(() => {
            moveCoins();
        }, COIN_MOVE_INTERVAL / 10);
    }

    function centerDragon() {
        const rect = gameArea.getBoundingClientRect();
        if (rect.width > 0) {
            dragon.style.left = (rect.width / 2) + 'px';
            dragon.style.top = (rect.height / 2) + 'px';
        } else {
            setTimeout(centerDragon, 20);
        }
    }

    window.addEventListener('resize', () => {
        setTimeout(() => {
            updateAreaSize();
            centerDragon();
        }, 70);
    });

    resetBtn.addEventListener('click', () => {
        currentProphecies = [];
        todayPropheciesCount = 0;
        localStorage.setItem('olli_today_prophecies', '0');
        localStorage.setItem('olli_prophecies', JSON.stringify([]));
        initDefaultProphecy();
        updateStatsUI();
        const listDiv = prophecyListDiv;
        listDiv.style.opacity = '0.7';
        setTimeout(() => listDiv.style.opacity = '1', 100);
        if (warningMsg) warningMsg.textContent = "Предсказания очищены!";
        setTimeout(() => { if (warningMsg) warningMsg.textContent = ""; }, 2000);
    });

    function init() {
        gameArea = document.getElementById('gameArea');
        dragon = document.getElementById('dragon');
        warningMsg = document.getElementById('warningMsg');
        
        loadAllData();
        updateAreaSize();
        centerDragon();
        bindEvents();
        startSpawning();
        startMoving();
    }

    init();
</script>
